---
name: "Database Connection Timeout"
id: "db-connection-timeout"
severity: "critical"
description: "Database connection pool exhausted or connection timeout"
aliases:
  - "DB timeout"
  - "Connection pool exhausted"

triggers:
  - "High latency on API responses"
  - "Error: 'connection timeout'"
  - "Error: 'max connections reached'"

troubleshooting:
  - step: "Check database connection status"
    command: "SELECT COUNT(*) FROM pg_stat_activity;"
    description: "Verify number of active connections"
  
  - step: "Monitor active connections"
    command: "SHOW max_connections;"
    description: "Check connection pool limit"
  
  - step: "Kill idle connections (if safe)"
    command: "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE state = 'idle';"
    description: "Terminate idle connections to free up slots"
  
  - step: "Scale database resources"
    description: "If persistent, increase connection pool size or add read replicas"

escalation:
  level_1: "Check database metrics in monitoring dashboard"
  level_2: "Contact DBA team or database service provider"
  level_3: "Initiate disaster recovery if database is down"

runbook: |
  1. Immediately check the monitoring dashboard for DB connection metrics
  2. SSH into database server and run provided troubleshooting commands
  3. If connections are near max, terminate idle connections
  4. If issue persists, increase connection pool size
  5. Notify affected users with ETA
  6. Document the incident in post-mortem

slack_notification: true
notify_channels:
  - "#incidents"
  - "#engineering"

# Email notifications (alternative to or in addition to Slack)
email_notification: true
email_recipients:
  - "team@example.com"
  - "oncall@example.com"

resolution_time_sla: 15 # minutes
