---
name: "SSL Certificate Expiration"
id: "ssl-certificate-expired"
severity: "high"
description: "SSL/TLS certificate expired or about to expire causing HTTPS failures"
aliases:
  - "SSL expired"
  - "Certificate expired"
  - "HTTPS not working"
  - "Net::ERR_CERT_DATE_INVALID"

triggers:
  - "Browser warning: 'Your connection is not private'"
  - "Error: SSL certificate has expired"
  - "Error: certificate_verify_failed"
  - "HTTPS traffic blocked"

troubleshooting:
  - step: "Check certificate expiry date"
    command: "openssl x509 -enddate -noout -in /path/to/cert.pem"
    description: "See when the certificate expires"
  
  - step: "Check which domains are affected"
    command: "openssl x509 -text -noout -in /path/to/cert.pem | grep -A1 'Subject Alternative Name'"
    description: "Find all domains covered by this certificate"
  
  - step: "Check certificate on live server"
    command: "echo | openssl s_client -servername example.com -connect example.com:443 2>/dev/null | openssl x509 -noout -enddate"
    description: "Verify the certificate currently served"
  
  - step: "Obtain new certificate"
    url: "https://letsencrypt.org/getting-started/"
    description: "Get a new SSL certificate (Let's Encrypt is free)"
  
  - step: "Install new certificate"
    description: "Update certificate on web server"

escalation:
  level_1: "Check certificate status and renewal options"
  level_2: "Contact SSL provider or certificate issuer"
  level_3: "Apply emergency fix if users are affected"

runbook: |
  1. Immediately check certificate expiry date
  2. Identify all affected domains
  3. If expired:
     - Obtain new certificate (Let's Encrypt for free)
     - Install on web server
     - Restart web services
  4. If expiring soon:
     - Schedule renewal during maintenance window
     - Set up auto-renewal to prevent future issues
  5. Test HTTPS on all affected domains
  6. Notify users if downtime occurred
  7. Set up monitoring/alerts for certificate expiry dates

slack_notification: true
notify_channels:
  - "#incidents"
  - "#infrastructure"

# Email notifications (alternative to or in addition to Slack)
email_notification: true
email_recipients:
  - "team@example.com"
  - "infrastructure-lead@example.com"

resolution_time_sla: 30  # minutes
impact: "Website HTTPS unavailable, users see security warnings"
