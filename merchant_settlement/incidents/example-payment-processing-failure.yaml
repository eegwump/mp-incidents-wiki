---
name: "Payment Processing Failure"
id: "payment-processing-failure"
severity: "critical"
description: "Transactions failing in payment gateway"
aliases:
  - "Payment gateway down"
  - "Transaction failures"

triggers:
  - "Payment transactions being rejected"
  - "Error: 'Unable to process payment'"
  - "High decline rate spike"

troubleshooting:
  - step: "Check payment gateway status"
    url: "https://status.stripe.com"
    description: "Verify if payment processor has known issues"
  
  - step: "Check API logs for payment errors"
    command: "grep 'payment.*error' /var/log/api.log | tail -100"
    description: "Look for specific error patterns"
  
  - step: "Verify authentication credentials"
    description: "Check if API keys are still valid and not rotated unexpectedly"
  
  - step: "Check merchant account status"
    description: "Verify merchant account is in good standing with payment processor"

escalation:
  level_1: "Check payment processor status page"
  level_2: "Contact payment processor support"
  level_3: "Activate fallback payment gateway if available"

runbook: |
  1. Check payment processor status page immediately
  2. Review recent API logs for error patterns
  3. Verify API keys and credentials are correct
  4. Check merchant account standing
  5. If external issue: communicate with customers
  6. If internal issue: debug API integration
  7. If persistent: activate backup payment gateway

slack_notification: true
notify_channels:
  - "#incidents"
  - "#payments"
  - "#business"

# Email notifications (alternative to or in addition to Slack)
email_notification: true
email_recipients:
  - "team@example.com"
  - "payments-lead@example.com"

resolution_time_sla: 5 # minutes
impact: "Revenue loss, customer dissatisfaction"
